<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
  <!-- Header Section -->
  <header>
    {% include header.html %}
  </header>

  <!-- Main Content Area -->
  <main class="container mx-auto px-4 py-8 flex flex-col md:flex-row">
    <!-- Blog Posts Section -->
    <section class="flex-1 md:mr-8">
      <h1 class="text-3xl font-bold mb-6">Latest Posts</h1>
      <div class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
        {% for post in site.posts %}
          <article class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md hover:shadow-lg transition-shadow">
            <h2 class="text-xl font-semibold mb-2"><a href="{{ post.url }}" class="text-blue-600 dark:text-blue-400 hover:underline">{{ post.title }}</a></h2>
            <p class="text-gray-600 dark:text-gray-400 mb-4">{{ post.excerpt | strip_html | truncate: 150 }}</p>
            <time class="text-sm text-gray-500 dark:text-gray-500">{{ post.date | date: "%B %d, %Y" }}</time>
          </article>
        {% endfor %}
      </div>
    </section>

    <!-- Sidebar -->
    <aside class="w-full md:w-64 mt-8 md:mt-0">
      {% include sidebar.html %}
    </aside>
  </main>

  <!-- Footer Section -->
  <footer>
    {% include footer.html %}
  </footer>

  <!-- Dark Mode Toggle Script (Optional) -->
  <script>
    const toggle = document.getElementById('dark-mode-toggle');
    if (toggle) {
      toggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
      });
    }
  </script>
</body>
</html>
