<!-- Sidebar Include -->
<aside class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow-md">
  <!-- Recent Posts Section -->
  <section class="mb-8">
    <h3 class="text-lg font-semibold mb-4 text-gray-900 dark:text-gray-100">Recent Posts</h3>
    <ul class="space-y-2">
      {% for post in site.posts limit:5 %}
        <li>
          <a href="{{ post.url }}" class="text-gray-700 dark:text-gray-300 hover:text-blue-600 dark:hover:text-blue-400 transition-colors text-sm">
            {{ post.title | truncate: 40 }}
          </a>
        </li>
      {% endfor %}
    </ul>
  </section>

  <!-- Categories/Tags Section -->
  <section>
    <h3 class="text-lg font-semibold mb-4 text-gray-900 dark:text-gray-100">Categories</h3>
    <div class="flex flex-wrap gap-2">
      {% for category in site.categories %}
        <a href="/categories/{{ category[0] | slugify }}" class="bg-blue-100 dark:bg-blue-900 text-blue-800 dark:text-blue-200 px-3 py-1 rounded-full text-sm hover:bg-blue-200 dark:hover:bg-blue-800 transition-colors">
          {{ category[0] }}
        </a>
      {% endfor %}
    </div>
  </section>
</aside>
